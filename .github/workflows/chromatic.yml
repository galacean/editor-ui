name: 'Chromatic'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  chromatic:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Run Chromatic for editor-ui
        id: chromatic-ui
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/ui
          zip: true

      - name: Find existing Storybook comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Storybook Preview

      - name: Comment PR with Storybook Preview URLs
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## 📚 Storybook Preview

            [🔗 Open Storybook](${{ steps.chromatic-ui.outputs.storybookUrl }}) · [🔨 View Build](${{ steps.chromatic-ui.outputs.buildUrl }})

            | | |
            |---|---|
            | 🧩 Components | ${{ steps.chromatic-ui.outputs.componentCount }} |
            | 📖 Stories | ${{ steps.chromatic-ui.outputs.specCount }} |
            | 🧪 Tests | ${{ steps.chromatic-ui.outputs.testCount }} |
            | 🔄 Changes | ${{ steps.chromatic-ui.outputs.changeCount }} |
            | ❌ Errors | ${{ steps.chromatic-ui.outputs.errorCount }} |

            > 📌 Commit: ${{ github.event.pull_request.head.sha }}
