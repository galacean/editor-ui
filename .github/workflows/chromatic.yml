name: "Chromatic"

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main

jobs:
  chromatic:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Run Chromatic for editor-ui
        id: chromatic-ui
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/ui
          zip: true

      - name: Comment PR with Storybook Preview URLs
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-tag: storybook-preview
          body: |
            ## 📚 Storybook Preview

            [🔗 Open Storybook](${{ steps.chromatic-ui.outputs.storybookUrl }})

            > 📌 Commit: ${{ github.event.pull_request.head.sha }}
            > _Powered by [Chromatic](https://www.chromatic.com/) · Auto-generated by GitHub Actions_